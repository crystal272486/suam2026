<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>디지털 교육 웹페이지</title>
    <style>
        body {
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .profile-container {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        p {
            color: #555;
            line-height: 1.6;
        }
        .game-list {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }
        .game-list li {
            background-color: #3498db;
            color: white;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <h1>디지털 미래 인재 교육</h1>
        <p>환영합니다!<br>이곳은 논리력 향상과 코딩 기초를 다지기 위한 교육용 웹페이지입니다.</p>
        
        <ul class="game-list">
            <li>🎴 카드 쌍 맞추기 게임</li>
            <li>💣 지뢰찾기 논리 게임</li>
            <li>⚡ 스피드 클릭 반응속도 게임</li>
        </ul>
        
        <p style="margin-top: 20px; font-size: 0.9em; color: #888;">
            앞으로 더 많은 교육 콘텐츠가 추가될 예정입니다.
        </p>
    </div>
</body>
</html>
