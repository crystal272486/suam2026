name: Notion Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "7,22,37,52 * * * *"

permissions:
  contents: write

concurrency:
  group: notion-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 파일 가져오기
        uses: actions/checkout@v4

      - name: Node.js 준비
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 1반부터 4반까지 노션 자료 동기화
        run: node scripts/sync-notion.mjs
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_DATABASE_ID_CLASS2: ${{ secrets.NOTION_DATABASE_ID_CLASS2 }}
          NOTION_DATABASE_ID_CLASS3: ${{ secrets.NOTION_DATABASE_ID_CLASS3 }}
          NOTION_DATABASE_ID_CLASS4: ${{ secrets.NOTION_DATABASE_ID_CLASS4 }}

      - name: 변경된 자료 저장소에 반영
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            data/class1.json \
            data/class2.json \
            data/class3.json \
            data/class4.json \
            data/sync-status.json

          if git diff --cached --quiet; then
            echo "변경된 노션 자료가 없습니다."
            exit 0
          fi

          git commit -m "자동 업데이트: Notion 작품 자료 및 동기화 상태"
          git push
